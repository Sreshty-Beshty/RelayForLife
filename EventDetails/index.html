<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-color: #f2edf5;
      --main-color: #46286e;
      --accent-color: #662485;
      --sec-accent-color: #b98fd6;
      --tert-accent-color: #d7b6ea;
      --text-color: #1f1f1f;
    }

    body {
      min-height: 100vh;
      font-family: 'Montserrat', system-ui;
      background: var(--bg-color);
      color: var(--text-color);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Decorative background blobs ── */
    .blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 520px; height: 520px;
      background: var(--tert-accent-color);
      top: -180px; left: -120px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 380px; height: 380px;
      background: var(--sec-accent-color);
      bottom: -120px; right: -80px;
      animation-delay: -4s;
    }
    .blob-3 {
      width: 260px; height: 260px;
      background: #c9a0e4;
      top: 55%; left: 55%;
      animation-delay: -7s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.06); }
    }

    /* ── Dot-grid texture overlay ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: radial-gradient(circle, var(--sec-accent-color) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.18;
      pointer-events: none;
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1.5px solid rgba(185,143,214,0.35);
      border-radius: 32px;
      padding: 64px 72px 56px;
      max-width: 780px;
      width: calc(100% - 48px);
      margin-top: 5%;
      box-shadow:
        0 4px 24px rgba(70,40,110,0.08),
        0 24px 80px rgba(70,40,110,0.10),
        inset 0 1px 0 rgba(255,255,255,0.8);
      text-align: center;
      animation: rise 0.9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Pill badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--tert-accent-color), #e2c9f0);
      color: var(--main-color);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 99px;
      margin-bottom: 28px;
      border: 1px solid rgba(185,143,214,0.5);
      animation: rise 0.9s 0.15s cubic-bezier(.22,1,.36,1) both;
    }
    .badge-dot {
      width: 7px; height: 7px;
      background: var(--accent-color);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.5); opacity: 0.6; }
    }

    /* ── Headline ── */
    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(2.8rem, 6vw, 4.4rem);
      font-weight: 800;
      line-height: 1.08;
      color: var(--main-color);
      margin-bottom: 16px;
      animation: rise 0.9s 0.25s cubic-bezier(.22,1,.36,1) both;
    }
    h1 span {
      background: linear-gradient(135deg, var(--accent-color) 0%, var(--sec-accent-color) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Subtext ── */
    .sub {
      font-size: 15px;
      font-weight: 400;
      color: #6b5880;
      line-height: 1.7;
      max-width: 460px;
      margin: 0 auto 48px;
      animation: rise 0.9s 0.35s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Divider ── */
    .divider {
      width: 56px; height: 3px;
      background: linear-gradient(90deg, var(--accent-color), var(--tert-accent-color));
      border-radius: 99px;
      margin: 0 auto 48px;
      animation: rise 0.9s 0.3s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 52px;
      animation: rise 0.9s 0.45s cubic-bezier(.22,1,.36,1) both;
    }
    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .time-box {
      position: relative;
      width: 100px;
      height: 100px;
      background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(215,182,234,0.3));
      border: 1.5px solid rgba(185,143,214,0.4);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 2px 8px rgba(70,40,110,0.07),
        inset 0 1px 0 rgba(255,255,255,0.9);
      overflow: hidden;
      transition: transform 0.15s ease;
    }
    .time-box:hover { transform: translateY(-3px); }
    .time-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, transparent 100%);
      pointer-events: none;
    }
    .time-num {
      font-family: 'Poppins', sans-serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--main-color);
      line-height: 1;
      position: relative;
      z-index: 1;
    }
    .time-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sec-accent-color);
    }

    /* flip animation on digit change */
    @keyframes flip {
      0%   { transform: translateY(-8px); opacity: 0; }
      100% { transform: translateY(0);     opacity: 1; }
    }
    .flip { animation: flip 0.3s ease forwards; }

    /* separators */
    .sep {
      font-family: 'Poppins', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--tert-accent-color);
      align-self: center;
      padding-bottom: 24px;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }

    /* ── Decorative corner accents ── */
    .corner {
      position: absolute;
      width: 48px; height: 48px;
      border-color: rgba(185,143,214,0.4);
      border-style: solid;
    }
    .corner-tl { top: 18px; left: 18px; border-width: 2px 0 0 2px; border-radius: 6px 0 0 0; }
    .corner-tr { top: 18px; right: 18px; border-width: 2px 2px 0 0; border-radius: 0 6px 0 0; }
    .corner-bl { bottom: 18px; left: 18px; border-width: 0 0 2px 2px; border-radius: 0 0 0 6px; }
    .corner-br { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; border-radius: 0 0 6px 0; }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .card { padding: 48px 28px 44px; border-radius: 24px; }
      .time-box { width: 72px; height: 72px; }
      .time-num { font-size: 2rem; }
      .countdown { gap: 10px; }
    }
  </style>
  <link rel="stylesheet" href="../Navbar/styles.css">

</head>
<body>
    <div id="navbarcontainer"></div>
    <script src="../Common/script.js"></script>
    <script type="module" src="../Navbar/script.js"></script>
    <script src="script.js"></script>
  <div class="blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="grid-overlay"></div>

  <div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="badge">
      <span class="badge-dot"></span>
      Something big is brewing
    </div>

    <h1>We're almost<br/><span>ready for you.</span></h1>

    <div class="divider"></div>

    <p class="sub">Good things take time — and we're putting in the work. Stay tuned for something worth the wait.</p>

    <div class="countdown">
      <div class="time-block">
        <div class="time-box"><span class="time-num" id="days">00</span></div>
        <span class="time-label">Days</span>
      </div>
      <div class="sep">:</div>
      <div class="time-block">
        <div class="time-box"><span class="time-num" id="hours">00</span></div>
        <span class="time-label">Hours</span>
      </div>
      <div class="sep">:</div>
      <div class="time-block">
        <div class="time-box"><span class="time-num" id="minutes">00</span></div>
        <span class="time-label">Minutes</span>
      </div>
      <div class="sep">:</div>
      <div class="time-block">
        <div class="time-box"><span class="time-num" id="seconds">00</span></div>
        <span class="time-label">Seconds</span>
      </div>
    </div>


  </div>

  <script>
    // Set launch date to exactly 3 days from now
    const launch = new Date(Date.now() + 3 * 24 * 60 * 60 * 1000);

    const pad = n => String(n).padStart(2, '0');

    function animateFlip(el, newVal) {
      if (el.textContent !== newVal) {
        el.classList.remove('flip');
        void el.offsetWidth; // reflow
        el.textContent = newVal;
        el.classList.add('flip');
      }
    }

    function tick() {
      const now  = Date.now();
      const diff = Math.max(0, launch - now);

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);

      animateFlip(document.getElementById('days'),    pad(d));
      animateFlip(document.getElementById('hours'),   pad(h));
      animateFlip(document.getElementById('minutes'), pad(m));
      animateFlip(document.getElementById('seconds'), pad(s));
    }

    tick();
    setInterval(tick, 1000);

  </script>
</body>
</html>
